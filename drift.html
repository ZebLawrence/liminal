<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>drift</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08080c;
      cursor: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    #stars { z-index: 1; }
    #particles { z-index: 2; }
    #ghosts { z-index: 3; opacity: 0.15; }
    #overlay { z-index: 4; pointer-events: none; }

    .cursor {
      position: fixed;
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s, border-color 0.4s;
      mix-blend-mode: screen;
      z-index: 100;
    }

    .cursor.still {
      width: 40px;
      height: 40px;
      border-color: rgba(255, 255, 255, 0.1);
    }

    .cursor-dot {
      position: fixed;
      width: 3px;
      height: 3px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 100;
    }

    .load-overlay {
      position: fixed;
      inset: 0;
      background: #08080c;
      z-index: 10000;
      animation: fadeIn 3s ease-out forwards;
      pointer-events: none;
    }

    @keyframes fadeIn {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }

    .visit-mark {
      position: fixed;
      bottom: 16px;
      right: 16px;
      pointer-events: none;
      z-index: 50;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .visit-mark .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }

    @media (hover: none) {
      .cursor, .cursor-dot { display: none; }
      html, body { cursor: auto; }
    }
  </style>
</head>
<body>
  <div class="load-overlay"></div>

  <canvas id="stars"></canvas>
  <canvas id="particles"></canvas>
  <canvas id="ghosts"></canvas>
  <canvas id="overlay"></canvas>

  <div class="cursor"></div>
  <div class="cursor-dot"></div>
  <div class="visit-mark"></div>

  <script>
    // ============ CANVAS SETUP ============
    const starsCanvas = document.getElementById('stars');
    const partCanvas = document.getElementById('particles');
    const ghostCanvas = document.getElementById('ghosts');
    const overlayCanvas = document.getElementById('overlay');
    const starsCtx = starsCanvas.getContext('2d');
    const partCtx = partCanvas.getContext('2d');
    const ghostCtx = ghostCanvas.getContext('2d');
    const overlayCtx = overlayCanvas.getContext('2d');
    const cursorEl = document.querySelector('.cursor');
    const cursorDot = document.querySelector('.cursor-dot');

    let W, H;
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      [starsCanvas, partCanvas, ghostCanvas, overlayCanvas].forEach(c => {
        c.width = W;
        c.height = H;
      });
    }
    resize();
    window.addEventListener('resize', resize);

    // ============ TIME-OF-DAY PALETTE ============
    function getTimeColors() {
      const h = new Date().getHours() + new Date().getMinutes() / 60;

      if (h >= 5 && h < 8) {
        // Dawn
        const t = (h - 5) / 3;
        return {
          bg: lerpColor([8, 8, 12], [20, 12, 15], t),
          particle: lerpColor([180, 160, 220], [255, 180, 120], t),
          accent: lerpColor([100, 80, 160], [255, 140, 80], t),
          glow: lerpColor([60, 40, 100], [200, 100, 60], t),
          name: 'dawn'
        };
      } else if (h >= 8 && h < 17) {
        // Day
        const t = (h - 8) / 9;
        return {
          bg: lerpColor([20, 12, 15], [12, 12, 18], t),
          particle: lerpColor([255, 220, 160], [200, 190, 220], t),
          accent: lerpColor([255, 200, 100], [160, 150, 200], t),
          glow: lerpColor([200, 150, 80], [100, 90, 140], t),
          name: 'day'
        };
      } else if (h >= 17 && h < 21) {
        // Dusk
        const t = (h - 17) / 4;
        return {
          bg: lerpColor([12, 12, 18], [10, 8, 16], t),
          particle: lerpColor([200, 190, 220], [160, 140, 220], t),
          accent: lerpColor([220, 120, 80], [120, 80, 180], t),
          glow: lerpColor([180, 80, 60], [80, 50, 140], t),
          name: 'dusk'
        };
      } else {
        // Night
        return {
          bg: [8, 8, 12],
          particle: [140, 160, 240],
          accent: [80, 100, 200],
          glow: [40, 50, 120],
          name: 'night'
        };
      }
    }

    function lerpColor(a, b, t) {
      return [
        Math.round(a[0] + (b[0] - a[0]) * t),
        Math.round(a[1] + (b[1] - a[1]) * t),
        Math.round(a[2] + (b[2] - a[2]) * t)
      ];
    }

    function rgb(c, a) {
      return a !== undefined
        ? `rgba(${c[0]},${c[1]},${c[2]},${a})`
        : `rgb(${c[0]},${c[1]},${c[2]})`;
    }

    // ============ STATE ============
    const state = {
      mx: W / 2, my: H / 2,
      tx: W / 2, ty: H / 2,
      cx: W / 2, cy: H / 2,
      lastMove: Date.now(),
      isStill: false,
      speed: 0,
      visits: 1,
      constellations: [],
      totalConstellations: 0,
      ghostTrail: [],
      currentTrail: [],
      trailSampleTimer: 0
    };

    // ============ PARTICLES ============
    const particles = [];
    const PARTICLE_COUNT_BASE = 180;

    class Particle {
      constructor() {
        this.reset();
        this.age = Math.random() * 1000;
      }

      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.baseSize = 1 + Math.random() * 2;
        this.size = this.baseSize;
        this.brightness = 0.3 + Math.random() * 0.7;
        this.phase = Math.random() * Math.PI * 2;
        this.orbitDist = 0;
        this.captured = false;
      }

      update(dt, colors) {
        this.age += dt;

        // Ambient drift — slow current
        const flowAngle = Math.sin(this.y * 0.002 + this.age * 0.0003) * Math.PI;
        this.vx += Math.cos(flowAngle) * 0.003 * dt;
        this.vy += Math.sin(flowAngle) * 0.001 * dt;

        // Cursor gravity
        const dx = state.mx - this.x;
        const dy = state.my - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        if (dist < 250) {
          const force = (250 - dist) / 250;

          if (state.isStill) {
            // Orbit when still
            const angle = Math.atan2(dy, dx);
            const targetDist = 30 + (this.phase / (Math.PI * 2)) * 80;
            const orbitSpeed = 0.5 + (1 - dist / 250) * 1.5;

            this.vx += Math.cos(angle + Math.PI / 2) * orbitSpeed * 0.02 * dt;
            this.vy += Math.sin(angle + Math.PI / 2) * orbitSpeed * 0.02 * dt;

            // Pull toward orbit radius
            const toPull = (dist - targetDist) * 0.001 * dt;
            this.vx += (dx / dist) * toPull;
            this.vy += (dy / dist) * toPull;

            this.captured = true;
          } else if (state.speed > 3) {
            // Scatter when moving fast
            this.vx -= (dx / dist) * force * 0.15 * dt;
            this.vy -= (dy / dist) * force * 0.15 * dt;
            this.captured = false;
          } else {
            // Gentle attraction
            this.vx += (dx / dist) * force * 0.02 * dt;
            this.vy += (dy / dist) * force * 0.02 * dt;
            this.captured = false;
          }

          this.size = this.baseSize + force * 2;
        } else {
          this.size += (this.baseSize - this.size) * 0.05;
          this.captured = false;
        }

        // Damping
        this.vx *= 0.98;
        this.vy *= 0.98;

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // Wrap
        if (this.x < -20) this.x += W + 40;
        if (this.x > W + 20) this.x -= W + 40;
        if (this.y < -20) this.y += H + 40;
        if (this.y > H + 20) this.y -= H + 40;
      }

      draw(ctx, colors) {
        const pulse = 0.7 + Math.sin(this.age * 0.003 + this.phase) * 0.3;
        const alpha = this.brightness * pulse * (this.captured ? 1.2 : 0.7);
        const c = this.captured ? colors.accent : colors.particle;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = rgb(c, Math.min(1, alpha));
        ctx.fill();

        // Glow for bright/captured particles
        if (alpha > 0.6) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
          ctx.fillStyle = rgb(c, alpha * 0.08);
          ctx.fill();
        }
      }
    }

    // ============ CONSTELLATIONS ============
    class Constellation {
      constructor(points, timestamp) {
        this.points = points; // [{x, y, size}]
        this.created = timestamp || Date.now();
        this.alpha = 1;
      }

      age() {
        const hours = (Date.now() - this.created) / (1000 * 60 * 60);
        return hours;
      }

      drift() {
        // Constellations drift over real time
        const hours = this.age();
        const driftX = Math.sin(this.created * 0.001) * hours * 0.5;
        const driftY = Math.cos(this.created * 0.001) * hours * 0.3;
        return { x: driftX, y: driftY };
      }

      draw(ctx, colors) {
        const hours = this.age();
        // Fade: full brightness for 24h, then slowly fade over weeks
        const fade = Math.max(0.05, 1 - hours / (24 * 14));
        const d = this.drift();

        ctx.save();
        ctx.translate(d.x, d.y);

        // Draw connections
        if (this.points.length > 1) {
          ctx.strokeStyle = rgb(colors.accent, fade * 0.15);
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          this.points.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          });
          ctx.stroke();
        }

        // Draw stars
        this.points.forEach(p => {
          // Core
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.8, 0, Math.PI * 2);
          ctx.fillStyle = rgb([255, 255, 255], fade * 0.9);
          ctx.fill();

          // Inner glow
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
          ctx.fillStyle = rgb(colors.accent, fade * 0.2);
          ctx.fill();

          // Outer glow
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 5, 0, Math.PI * 2);
          ctx.fillStyle = rgb(colors.glow, fade * 0.05);
          ctx.fill();
        });

        ctx.restore();
      }
    }

    // ============ PERSISTENCE ============
    function loadState() {
      try {
        const saved = localStorage.getItem('drift_state');
        if (saved) {
          const data = JSON.parse(saved);
          state.visits = (data.visits || 0) + 1;
          state.totalConstellations = data.totalConstellations || 0;

          // Restore constellations
          if (data.constellations) {
            data.constellations.forEach(c => {
              // Denormalize positions
              const points = c.points.map(p => ({
                x: p.x * W,
                y: p.y * H,
                size: p.size
              }));
              state.constellations.push(new Constellation(points, c.created));
            });
          }

          // Restore ghost trail from last visit
          if (data.lastTrail) {
            state.ghostTrail = data.lastTrail.map(p => ({
              x: p.x * W,
              y: p.y * H
            }));
          }
        }
      } catch (e) {
        // Fresh start
      }

      // Add particles based on visit count
      const count = Math.min(500, PARTICLE_COUNT_BASE + state.visits * 15);
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }

      // Visit marks
      const markContainer = document.querySelector('.visit-mark');
      for (let i = 0; i < Math.min(state.visits, 20); i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.opacity = 0.1 + (i / Math.min(state.visits, 20)) * 0.4;
        markContainer.appendChild(dot);
      }
    }

    function saveState() {
      try {
        // Normalize constellation positions
        const constellations = state.constellations.slice(-30).map(c => ({
          points: c.points.map(p => ({
            x: p.x / W,
            y: p.y / H,
            size: p.size
          })),
          created: c.created
        }));

        // Normalize trail
        const lastTrail = state.currentTrail.slice(-200).map(p => ({
          x: p.x / W,
          y: p.y / H
        }));

        localStorage.setItem('drift_state', JSON.stringify({
          visits: state.visits,
          totalConstellations: state.totalConstellations,
          constellations,
          lastTrail
        }));
      } catch (e) {}
    }

    // ============ CRYSTALLIZE ============
    function crystallize(x, y) {
      // Capture nearby particles into a constellation
      const nearby = particles.filter(p => {
        const dx = p.x - x;
        const dy = p.y - y;
        return Math.sqrt(dx * dx + dy * dy) < 100;
      });

      if (nearby.length < 2) {
        // Not enough particles — create a single star
        const c = new Constellation([{ x, y, size: 2 }]);
        state.constellations.push(c);
        state.totalConstellations++;
        saveState();
        return;
      }

      // Pick the brightest ones
      const chosen = nearby
        .sort((a, b) => b.brightness - a.brightness)
        .slice(0, Math.min(8, nearby.length));

      const points = chosen.map(p => ({
        x: p.x,
        y: p.y,
        size: p.size
      }));

      // Connect them in order of proximity (nearest neighbor)
      const ordered = [points.shift()];
      while (points.length > 0) {
        const last = ordered[ordered.length - 1];
        let bestIdx = 0;
        let bestDist = Infinity;
        points.forEach((p, i) => {
          const d = Math.sqrt((p.x - last.x) ** 2 + (p.y - last.y) ** 2);
          if (d < bestDist) { bestDist = d; bestIdx = i; }
        });
        ordered.push(points.splice(bestIdx, 1)[0]);
      }

      const c = new Constellation(ordered);
      state.constellations.push(c);
      state.totalConstellations++;

      // Scatter captured particles outward
      chosen.forEach(() => {
        const p = nearby[Math.floor(Math.random() * nearby.length)];
        if (p) {
          const angle = Math.random() * Math.PI * 2;
          p.vx += Math.cos(angle) * 2;
          p.vy += Math.sin(angle) * 2;
        }
      });

      // Ripple effect on overlay
      createRipple(x, y);
      saveState();
    }

    function createRipple(x, y) {
      const start = performance.now();
      const duration = 2000;

      function drawRipple() {
        const elapsed = performance.now() - start;
        if (elapsed > duration) return;

        const t = elapsed / duration;
        const radius = t * 150;
        const alpha = (1 - t) * 0.3;

        overlayCtx.beginPath();
        overlayCtx.arc(x, y, radius, 0, Math.PI * 2);
        overlayCtx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        overlayCtx.lineWidth = 1 - t * 0.5;
        overlayCtx.stroke();

        requestAnimationFrame(drawRipple);
      }
      drawRipple();
    }

    // ============ GHOST TRAIL ============
    function drawGhostTrail(ctx) {
      if (state.ghostTrail.length < 2) return;

      ctx.clearRect(0, 0, W, H);
      ctx.beginPath();
      ctx.moveTo(state.ghostTrail[0].x, state.ghostTrail[0].y);

      for (let i = 1; i < state.ghostTrail.length; i++) {
        ctx.lineTo(state.ghostTrail[i].x, state.ghostTrail[i].y);
      }

      ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Fade out ghost trail over time
      if (ghostFadeStart === 0) ghostFadeStart = performance.now();
      const fadeElapsed = performance.now() - ghostFadeStart;
      const fadeAlpha = Math.max(0, 1 - fadeElapsed / 15000); // 15s fade
      ghostCanvas.style.opacity = 0.15 * fadeAlpha;
    }

    let ghostFadeStart = 0;

    // ============ VORTEX SECRET ============
    const circleTracker = {
      points: [],
      maxPoints: 60,
      lastCheck: 0
    };

    function checkForCircle() {
      const pts = circleTracker.points;
      if (pts.length < 30) return false;

      // Check if recent points form a rough circle
      const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
      const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;
      const avgR = pts.reduce((s, p) => s + Math.sqrt((p.x - cx) ** 2 + (p.y - cy) ** 2), 0) / pts.length;

      if (avgR < 30 || avgR > 200) return false;

      // Check variance of radius — should be low for a circle
      const variance = pts.reduce((s, p) => {
        const r = Math.sqrt((p.x - cx) ** 2 + (p.y - cy) ** 2);
        return s + (r - avgR) ** 2;
      }, 0) / pts.length;

      const stddev = Math.sqrt(variance);
      if (stddev / avgR < 0.25) {
        createVortex(cx, cy, avgR);
        circleTracker.points = [];
        return true;
      }
      return false;
    }

    let vortexes = [];

    function createVortex(x, y, radius) {
      vortexes.push({
        x, y, radius,
        strength: 3,
        life: 300,
        born: performance.now()
      });
    }

    // ============ INPUT ============
    document.addEventListener('mousemove', (e) => {
      state.tx = e.clientX;
      state.ty = e.clientY;
      state.lastMove = Date.now();

      // Track for circle detection
      circleTracker.points.push({ x: e.clientX, y: e.clientY });
      if (circleTracker.points.length > circleTracker.maxPoints) {
        circleTracker.points.shift();
      }

      // Sample trail
      state.currentTrail.push({ x: e.clientX, y: e.clientY });
      if (state.currentTrail.length > 500) state.currentTrail.shift();
    });

    document.addEventListener('click', (e) => {
      crystallize(e.clientX, e.clientY);
    });

    document.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      state.tx = t.clientX;
      state.ty = t.clientY;
      state.lastMove = Date.now();
    });

    document.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      state.tx = t.clientX;
      state.ty = t.clientY;
      state.lastMove = Date.now();
      state.currentTrail.push({ x: t.clientX, y: t.clientY });
      if (state.currentTrail.length > 500) state.currentTrail.shift();
    });

    document.addEventListener('touchend', (e) => {
      if (e.changedTouches[0]) {
        const t = e.changedTouches[0];
        crystallize(t.clientX, t.clientY);
      }
    });

    // ============ MAIN LOOP ============
    let lastTime = performance.now();
    let colorsCache = getTimeColors();
    let colorTimer = 0;

    function loop() {
      const now = performance.now();
      const dt = Math.min(50, now - lastTime);
      lastTime = now;

      // Update colors periodically
      colorTimer += dt;
      if (colorTimer > 30000) {
        colorsCache = getTimeColors();
        colorTimer = 0;
      }
      const colors = colorsCache;

      // Update background
      document.body.style.background = rgb(colors.bg);

      // Smooth cursor
      state.cx += (state.tx - state.cx) * 0.12;
      state.cy += (state.ty - state.cy) * 0.12;

      const dx = state.tx - state.mx;
      const dy = state.ty - state.my;
      state.speed = Math.sqrt(dx * dx + dy * dy);
      state.mx = state.tx;
      state.my = state.ty;

      // Stillness detection
      const stillDuration = Date.now() - state.lastMove;
      state.isStill = stillDuration > 2000;

      cursorEl.style.left = state.cx + 'px';
      cursorEl.style.top = state.cy + 'px';
      cursorDot.style.left = state.tx + 'px';
      cursorDot.style.top = state.ty + 'px';

      if (state.isStill) {
        cursorEl.classList.add('still');
      } else {
        cursorEl.classList.remove('still');
      }

      // Check for circle gesture
      if (now - circleTracker.lastCheck > 500) {
        checkForCircle();
        circleTracker.lastCheck = now;
      }

      // Update vortexes
      vortexes = vortexes.filter(v => {
        v.life -= dt * 0.016;
        v.strength *= 0.998;
        return v.life > 0;
      });

      // Update particles
      particles.forEach(p => {
        p.update(dt, colors);

        // Vortex influence
        vortexes.forEach(v => {
          const vdx = v.x - p.x;
          const vdy = v.y - p.y;
          const vdist = Math.sqrt(vdx * vdx + vdy * vdy) || 1;
          if (vdist < v.radius * 2) {
            const force = v.strength * (1 - vdist / (v.radius * 2));
            const angle = Math.atan2(vdy, vdx);
            // Tangential + inward
            p.vx += (Math.cos(angle + Math.PI / 2) * force * 0.05 + vdx / vdist * force * 0.01) * dt;
            p.vy += (Math.sin(angle + Math.PI / 2) * force * 0.05 + vdy / vdist * force * 0.01) * dt;
          }
        });
      });

      // ---- DRAW ----

      // Stars layer (constellations) — redraw less often
      starsCtx.clearRect(0, 0, W, H);
      state.constellations.forEach(c => c.draw(starsCtx, colors));

      // Particles
      partCtx.clearRect(0, 0, W, H);
      particles.forEach(p => p.draw(partCtx, colors));

      // Vortex visual
      vortexes.forEach(v => {
        const alpha = (v.life / 300) * 0.15;
        partCtx.beginPath();
        partCtx.arc(v.x, v.y, v.radius, 0, Math.PI * 2);
        partCtx.strokeStyle = rgb(colors.accent, alpha);
        partCtx.lineWidth = 1;
        partCtx.stroke();
      });

      // Ghost trail
      if (state.ghostTrail.length > 1) {
        drawGhostTrail(ghostCtx);
      }

      // Overlay (ripples drawn via their own rAF)
      overlayCtx.clearRect(0, 0, W, H);

      requestAnimationFrame(loop);
    }

    // ============ INIT ============
    loadState();
    loop();

    window.addEventListener('beforeunload', saveState);
    setInterval(saveState, 10000);

    setTimeout(() => {
      document.querySelector('.load-overlay').remove();
    }, 3500);
  </script>
</body>
</html>
